AntiFeatures:
  - NonFreeNet
  - Tracking

Builds:
  - versionName: 2.0.0.0
    versionCode: 14
    commit: v2.0.0.0
    subdir: app
    srclibs:
      - NewPipeExtractor@v0.26.0
    gradle:
      - yes
    prebuild:
      - sed -i 's|maven { url = uri("https://maven-central.storage-download.googleapis.com/maven2/") }|mavenCentral()|g'
          ../settings.gradle.kts
      - sed -i '/^dependencyResolutionManagement/i\includeBuild("$$NewPipeExtractor$$") { dependencySubstitution { substitute(module("com.github.TeamNewPipe:NewPipeExtractor")).using(project(":extractor")) } }' ../settings.gradle.kts
      - find $$NewPipeExtractor$$ -name '*.gradle' -o -name '*.gradle.kts' | xargs sed -i 's/languageVersion.set(JavaLanguageVersion.of(11))/languageVersion.set(JavaLanguageVersion.of(21))/g;s/JavaLanguageVersion.of(11)/JavaLanguageVersion.of(21)/g'

MaintainerNotes: |-
  The app requires NonFreeNet due to interaction with third-party, non-free network services (YouTube, KuGou, LrcLib). The tracking AntiFeature is due to the usage of ACRA for automated crash reporting.

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: 2.0.0.0
CurrentVersionCode: 14
