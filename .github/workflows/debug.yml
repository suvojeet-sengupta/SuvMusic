name: Debug Build

on:
  push:
    branches-ignore: [ "main" ] # Runs on all branches EXCEPT main (which build.yml handles)
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  debug_build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Protobuf Compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        # Debug builds usually don't need the keystore secrets but might need these
        LAST_FM_API_KEY: ${{ secrets.LAST_FM_API_KEY }}
        LAST_FM_SHARED_SECRET: ${{ secrets.LAST_FM_SHARED_SECRET }}
        GRADLE_OPTS: -Dorg.gradle.workers.max=2

    - name: Extract version name
      id: version
      run: |
        VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
        mv "$APK_FILE" "app/build/outputs/apk/debug/SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-debug.apk"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-debug
        path: app/build/outputs/apk/debug/SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-debug.apk
        if-no-files-found: error
        retention-days: 7
