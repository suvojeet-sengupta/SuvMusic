name: Build and Release

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Protobuf Compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    # Gradle Wrapper cache
    - name: Cache Gradle wrapper
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-
    
    # Gradle dependencies cache
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/daemon
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Use gradle-build-action for better caching
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.jks

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        LAST_FM_API_KEY: ${{ secrets.LAST_FM_API_KEY }}
        LAST_FM_SHARED_SECRET: ${{ secrets.LAST_FM_SHARED_SECRET }}
        GRADLE_OPTS: -Dorg.gradle.workers.max=2

    - name: Extract version name
      id: version
      run: |
        VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename APK with version
      run: |
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
        mv "$APK_FILE" "app/build/outputs/apk/release/SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-${{ github.run_number }}.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-${{ github.run_number }}-apk
        path: app/build/outputs/apk/release/SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-${{ github.run_number }}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.VERSION_NAME }}-${{ github.run_number }}
        name: SuvMusic v${{ steps.version.outputs.VERSION_NAME }} (Build ${{ github.run_number }})
        body: |
          # SuvMusic v${{ steps.version.outputs.VERSION_NAME }} (Build ${{ github.run_number }})

          [![Build Status](https://img.shields.io/github/actions/workflow/status/suvojeet-sengupta/SuvMusic/build.yml?style=flat-square)](https://github.com/suvojeet-sengupta/SuvMusic/actions/workflows/build.yml)
          [![Platform](https://img.shields.io/badge/Platform-Android-3DDC84?style=flat-square&logo=android&logoColor=white)](https://developer.android.com)

          ---

          ### Build Information
          - **Type:** Pre-release / Automated Build
          - **Version:** `${{ steps.version.outputs.VERSION_NAME }}`
          - **Build Number:** `${{ github.run_number }}`
          - **Commit Reference:** `${{ github.sha }}`

          ---

          ### Core Features
          - High-fidelity music streaming from YouTube/YouTube Music
          - Integrated local offline audio playback
          - Material 3 Expressive Design System
          - Advanced audio processing and normalization

          ---

          ### Artifacts
          - **APK:** Standard installation package for Android devices

          ---
          *This is an automated build generated by the SuvMusic continuous integration pipeline.*
        draft: false
        prerelease: true
        files: |
          app/build/outputs/apk/release/SuvMusic-v${{ steps.version.outputs.VERSION_NAME }}-${{ github.run_number }}.apk
